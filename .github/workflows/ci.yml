name: CI

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: True

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    test:
        name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      python-version: "3.8"
                      envfile: ".github/environment-minimal.yml"
                      channel-priority: "flexible"
                      name: "Minimal dependencies"

                    - os: ubuntu-latest
                      python-version: "3.9"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-latest
                      python-version: "3.10"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-latest
                      python-version: "3.11"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-latest
                      python-version: "3.12"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-24.04-arm
                      python-version: "3.13"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-latest
                      python-version: "3.13"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: macos-latest
                      python-version: "3.13"
                      channel-priority: "flexible"
                      envfile: ".github/environment-ci.yml"

                    - os: windows-latest
                      python-version: "3.13"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

        steps:
        - uses: actions/checkout@v6
          with:
            submodules: true

        - name: Create short temp directory (Windows only)
          if: runner.os == 'Windows'
          run: mkdir C:\tmp
          shell: cmd

        - name: Set environment variables (Windows only)
          if: runner.os == 'Windows'
          run: |
            echo "TMP=C:\tmp" >> $env:GITHUB_ENV
            echo "TEMP=C:\tmp" >> $env:GITHUB_ENV
          shell: pwsh

        - name: Install OS dependencies
          shell: bash -l {0}
          run: |
            case "${{ runner.os }}" in
            Linux)
              sudo apt-get update -yy
              sudo apt-get install -yy  libsamplerate0
              ;; 
            macOS)
              brew install libsamplerate
              ;;
            esac

        - name: Cache conda
          uses: actions/cache@v5
          env:
            # Increase this value to reset cache if etc/example-environment.yml has not changed
            CACHE_NUMBER: 0
          with:
            path: ~/conda_pkgs_dir
            key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.python-version }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles( matrix.envfile ) }}

        - name: Install Conda environment
          uses: conda-incubator/setup-miniconda@9b650ee299f7fe47ab3a9688166e64e965c83272
          with:
            auto-update-conda: true
            python-version: ${{ matrix.python-version }}
            add-pip-as-python-dependency: true
            auto-activate: false
            activate-environment: test
            channel-priority: ${{ matrix.channel-priority }}
            environment-file: ${{ matrix.envfile }}
            use-only-tar-bz2: false # IMPORTANT: This needs to be set for caching to work properly!

        - name: Conda info
          shell: bash -l {0}
          run: |
            conda info -a
            conda list
            python -c "import scipy; scipy.show_config()"

        - name: Install Rust toolchain
          uses: dtolnay/rust-toolchain@stable

        - name: Install iron-librosa (editable)
          shell: bash -l {0}
          run: python -m pip install --upgrade-strategy only-if-needed -e .[tests]

        - name: Run pytest
          shell: bash -l {0}
          run: PYTHONPATH=Benchmarks/scripts pytest

        - name: Upload coverage to Codecov
          if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' }}
          uses: codecov/codecov-action@v5
          with:
            token: ${{ secrets.CODECOV_TOKEN }}
            files: ./coverage.xml
            flags: unittests
            env_vars: OS,PYTHON
            name: codecov-umbrella
            fail_ci_if_error: false
            verbose: true

        - name: Type check package
          shell: bash -l {0}
          run: python -m mypy --pretty librosa

        - name: Type check tests
          shell: bash -l {0}
          run: MYPYPATH=Benchmarks/scripts python -m mypy --pretty tests

        - name: Validate Phase 16 benchmark payloads
          shell: bash -l {0}
          run: python Benchmarks/scripts/validate_benchmark_payloads.py --paths Benchmarks/results/phase16_host_*.json --require-files
