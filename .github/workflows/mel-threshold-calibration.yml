name: Mel Threshold Calibration

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  calibrate:
    name: Calibrate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install OS dependencies
        shell: bash
        run: |
          case "${{ runner.os }}" in
          Linux)
            sudo apt-get update -yy
            sudo apt-get install -yy libsamplerate0
            ;;
          macOS)
            brew install libsamplerate
            ;;
          esac

      - name: Install iron-librosa
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade-strategy only-if-needed -e .

      - name: Run mel threshold calibration
        shell: bash
        run: |
          python -u scripts/calibrate_mel_threshold.py --registry scripts/mel_threshold_registry.${{ runner.os }}.${{ runner.arch }}.json

      - name: Upload registry artifact
        uses: actions/upload-artifact@v4
        with:
          name: mel-threshold-${{ runner.os }}-${{ runner.arch }}
          path: scripts/mel_threshold_registry.*.*.json
          if-no-files-found: error

  merge-and-pr:
    name: Merge and Open PR
    needs: calibrate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all calibration artifacts
        uses: actions/download-artifact@v4
        with:
          path: .tmp/mel-threshold

      - name: Merge thresholds into canonical registry
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import json
          import time
          from pathlib import Path

          target = Path("scripts/mel_threshold_registry.json")
          payload = json.loads(target.read_text(encoding="utf-8"))
          thresholds = payload.get("thresholds", {})
          if not isinstance(thresholds, dict):
              thresholds = {}

          changed = False
          files = sorted(glob.glob(".tmp/mel-threshold/**/mel_threshold_registry.*.*.json", recursive=True))
          if not files:
              raise SystemExit("No calibration artifacts found")

          for file_path in files:
              data = json.loads(Path(file_path).read_text(encoding="utf-8"))
              for key, value in data.get("thresholds", {}).items():
                  if not isinstance(value, int):
                      continue
                  if value <= 0:
                      continue
                  if thresholds.get(key) != value:
                      thresholds[key] = value
                      changed = True

          if changed:
              payload["version"] = 1
              payload["updated_at"] = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
              payload["thresholds"] = dict(sorted(thresholds.items()))
              target.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
              print("Updated scripts/mel_threshold_registry.json")
          else:
              print("No threshold updates detected")
          PY

      - name: Open pull request with updated thresholds
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update mel threshold registry from multi-host calibration"
          title: "Update mel threshold registry from multi-host calibration"
          body: |
            This PR was auto-generated by the Mel Threshold Calibration workflow.

            It updates `scripts/mel_threshold_registry.json` with measured non-zero
            threshold values collected on Linux/macOS calibration runners.
          branch: chore/mel-threshold-calibration
          delete-branch: true
          add-paths: |
            scripts/mel_threshold_registry.json

